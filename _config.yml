# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Chase Inc.
developer: Lucifer Chase
url: "https://luciferchase.github.io"
# baseurl: ""
logo: "/assets/images/favicon-4.png"
email: luciferchase@pm.me
description: >- # this means to ignore newlines until "baseurl:"
  Personal Website of just another normal 17 year old boy who likes to waste time doing unnecessary 
  project on the Internet instead of studying.
# twitter_username: username
github_username: luciferchase
minimal_mistakes_skin: dark
search: true

# Build settings
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.22.0"
repository: "luciferchase/luciferchase.github.io"
# Outputting
permalink: /:categories/:title/
paginate: 10 # amount of posts to show
paginate_path: /page:num/
timezone: Asia/Calcutta # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-seo-tag

author:
  name   : "Lucifer Chase"
  avatar : "/assets/images/bio-photo-luciferchase.jpg"
  bio    : "Hola, I am Lucifer Chase, I am 17 year old. I like messing with computer and reading books."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://luciferchase.github.io"
    # - label: "Twitter"
    #   icon: "fab fa-fw fa-twitter-square"
    #   url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/luciferchase"
    # - label: "Instagram"
    #   icon: "fab fa-fw fa-instagram"
    #   url: "https://instagram.com/"
    - label: "Discord"
      icon: "fab fa-fw fa-discord"
    - label: "Email"
      icon: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:luciferchase@pm.me"

footer:
  links:
    # - label: "Twitter"
    #   icon: "fab fa-fw fa-twitter-square"
    #   url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/luciferchase"
    # - label: "Instagram"
    #   icon: "fab fa-fw fa-instagram"
    #   url: "https://instagram.com/"
    - atom_feed: 
      hide: true

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
      toc: true
      toc_label: "Table of Contents"
      # toc_icon: "cog"
      permalink: /:categories/:title
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
      toc: true
      toc_label: "Table of Contents"
      # toc_icon: "cog"

comments:
  provider: "disqus"
  disqus:
    shortname: "https-luciferchase-github-io"

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-XYMV3Q60GQ"
    anonymize_ip: false

og_image: /assets/images/logo-3.jpg
teaser: /assets/images/logo-3.jpg